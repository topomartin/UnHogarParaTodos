<div class="register-container">
  <mat-card class="register-card">
    <mat-card-title>Regístrate</mat-card-title>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="username" required>
        <mat-error *ngIf="registerForm.get('username')?.hasError('required')">
          El nombre de usuario es obligatorio
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" required>
        <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
          El email es obligatorio
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Contraseña</mat-label>
        <input matInput [type]="hide() ? 'password' : 'text'" formControlName="password" required>
        <button mat-icon-button matSuffix (click)="clickEvent($event)" type="button" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide()">
          <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
          La contraseña es obligatoria
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Rol</mat-label>
        <input matInput formControlName="role" required>
        <mat-error *ngIf="registerForm.get('role')?.hasError('required')">
          El rol es obligatorio
        </mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" class="register-button" [disabled]="registerForm.invalid">
        Registrarse
      </button>
      
      <div class="login-text">
        ¿Ya tienes cuenta?
        <button mat-button color="accent" routerLink="/login">Inicia sesión</button>
      </div>
    </form>
  </mat-card>
</div>

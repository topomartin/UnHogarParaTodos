<div class="login-container">
  <mat-card class="login-card">
    <mat-card-title class="welcome-text">Bienvenido</mat-card-title>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Usuario -->
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="username" required>
        <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
          El nombre de usuario es obligatorio
        </mat-error>
      </mat-form-field>

      <!-- Contraseña -->
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Contraseña</mat-label>
        <input matInput [type]="hide() ? 'password' : 'text'" formControlName="password" required>
        <button mat-icon-button matSuffix type="button" (click)="clickEvent($event)">
          <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          La contraseña es obligatoria
        </mat-error>
      </mat-form-field>

      <!-- Botón Login -->
      <button mat-raised-button color="primary" class="full-width login-button" type="submit"
        [disabled]="loginForm.invalid">
        Login
      </button>
    </form>

    <!-- Texto de registro -->
    <div class="register-text">
  No tienes la cuenta?
  <button mat-button color="accent" (click)="goToRegister()">Regístrate</button>
</div>
  </mat-card>
</div>


<mat-tab-group>

  <mat-tab *ngFor="let tab of tabs" [label]="tab.modelName">
    <ng-template matTabContent>
      <div style="padding: 16px;">
        <app-innertab
          [modelName] = "tab.modelName"
          [canCreate] = "tab.canCreate"
          [canUpdate] = "tab.canUpdate">
        </app-innertab>
      </div>
    </ng-template>
  </mat-tab>

</mat-tab-group>

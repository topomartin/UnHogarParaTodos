<div class="perfil-container" *ngIf="user; else loading">

  <h1 class="titulo">PERFIL</h1>

  <div class="perfil-card">
    
    <div class="campo">
      <span class="label">Nombre:</span>
      <span class="valor">{{ user.username }}</span>
    </div>

    <div class="campo">
      <span class="label">Email:</span>
      <span class="valor">{{ user.email }}</span>
    </div>

    <div class="campo">
      <span class="label">Contraseña:</span>
      <span class="valor password">********</span>
    </div>

    <div class="campo">
      <span class="label">Rol:</span>
      <span class="valor">{{ user.role }}</span>
    </div>

    <button class="btn-editar" (click)="editarPerfil()">
      Editar perfil
    </button>

  </div>

</div>

<!-- Mensaje si user aún no cargó -->
<ng-template #loading>
  <p>Cargando perfil...</p>
</ng-template>

<p *ngIf="user === null">No se pudo cargar el perfil</p>

<div class="editperfil-container">
  <h1 class="titulo">Editar Perfil</h1>

  <form [formGroup]="editForm" (ngSubmit)="onSubmit()">

    <!-- Usuario -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Usuario</mat-label>
      <input matInput formControlName="username">
      <mat-error *ngIf="editForm.get('username')?.hasError('required')">
        El nombre de usuario es obligatorio
      </mat-error>
    </mat-form-field>

    <!-- Email -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email">
      <mat-error *ngIf="editForm.get('email')?.hasError('required')">
        El email es obligatorio
      </mat-error>
      <mat-error *ngIf="editForm.get('email')?.hasError('email')">
        Email no válido
      </mat-error>
    </mat-form-field>

    <!-- Contraseña -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Nueva Contraseña</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
      <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="editForm.get('password')?.hasError('minlength')">
        La contraseña debe tener al menos 6 caracteres
      </mat-error>
    </mat-form-field>

    <!-- Confirmar Contraseña -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Confirmar Contraseña</mat-label>
      <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" formControlName="confirmPassword">
      <button mat-icon-button matSuffix type="button" (click)="hideConfirmPassword = !hideConfirmPassword">
        <mat-icon>{{ hideConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="editForm.get('confirmPassword')?.hasError('confirmPasswordRequired')">
        Debes confirmar la nueva contraseña
      </mat-error>
      <mat-error *ngIf="editForm.get('confirmPassword')?.hasError('passwordMismatch')">
        Las contraseñas no coinciden
      </mat-error>
    </mat-form-field>

    <!-- Botón Guardar -->
    <button mat-raised-button color="primary" type="submit" [disabled]="editForm.invalid">
      Guardar Cambios
    </button>
  </form>
</div>
